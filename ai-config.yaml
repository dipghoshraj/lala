version: 1

Modeltypes:
  types: ["Reasoning", "Text Generation"]

Models:
  - name: "LLML"
    description: "A large language model for reasoning and text generation."
    type: "Reasoning"
    parameters:
      - name: "temperature"
        description: "Controls the randomness of the output."
        type: "float"
        default: 0.7
      - name: "max_tokens"
        description: "The maximum number of tokens to generate."
        type: "integer"
        default: 100
      - name: "n_gpu_layers"
        description: "Number of model layers to offload to GPU. Set to 99 to offload all layers (requires CUDA/Metal build). Set to 0 for CPU-only."
        type: "integer"
        default: 0
      - name: "n_threads"
        description: "Number of CPU threads for token generation. Set to your physical core count (not logical/HT). 0 = auto-detect."
        type: "integer"
        default: 4
      - name: "n_ctx"
        description: "Context window size in tokens. Smaller = faster KV cache. Use 512 for short queries, 2048 for longer conversations."
        type: "integer"
        default: 512
      - name: "n_batch"
        description: "Batch size for prompt evaluation. Larger = faster prompt processing. 512 is recommended."
        type: "integer"
        default: 512
    modelPath : "E:\\model-guff\\mistral-7b-v0.1.Q4_K_M.gguf"